<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex Sessions</title>
<link rel="stylesheet" href="/static/base.css">
</head>
<body>
<div id="progress-bar" style="width:0%"></div>

<div class="page-layout">
<!-- ── HEADER (fixed) ── -->
<div class="page-header">
  <div class="topbar">
    <span class="brand">CODEX SESSIONS</span>
    <div class="pills" id="account-pills"></div>
    <div class="pills" id="preset-chips">
      <button class="pill active" data-preset="24h">24H</button>
      <button class="pill" data-preset="5d">5D</button>
      <button class="pill" data-preset="7d">7D</button>
      <button class="pill" data-preset="30d">30D</button>
      <button class="pill" data-preset="all">All</button>
    </div>
    <div class="tabs" id="view-tabs">
      <button class="tab active" data-view="sessions">Sessions</button>
      <button class="tab" data-view="projects">Projects</button>
      <button class="tab" data-view="timeline">Timeline</button>
    </div>
    <div class="topbar-right">
      <span id="last-update">&mdash;</span>
      <button class="refresh-btn on" id="refresh-toggle" title="Toggle auto-refresh">Auto</button>
    </div>
  </div>
  <div class="active-strip" id="active-strip"></div>
  <div id="error-banner"></div>
  <div class="metrics" id="metrics-row">
    <div class="metric highlight"><div class="label">Input</div><div class="value" id="m-input">&mdash;</div></div>
    <div class="metric"><div class="label">Output</div><div class="value" id="m-output">&mdash;</div></div>
    <div class="metric"><div class="label">Cached</div><div class="value" id="m-cached">&mdash;</div></div>
    <div class="metric"><div class="label">Sessions</div><div class="value" id="m-sessions">&mdash;</div></div>
    <div class="metric"><div class="label">Projects</div><div class="value" id="m-projects">&mdash;</div></div>
    <div class="metric"><div class="label">Latest</div><div class="value" id="m-latest">&mdash;</div></div>
    <div class="metric"><div class="label">Context</div><div class="value" id="m-context">&mdash;</div></div>
    <div class="metric"><div class="label">Window</div><div class="value" id="m-window">&mdash;</div></div>
  </div>
  <div class="quick-stats" id="quick-stats"></div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Filter sessions... (project, session id, model, account)" autocomplete="off">
    <span id="bulk-delete-slot"></span>
  </div>
</div>

<!-- ── MIDDLE (scrollable) ── -->
<div class="page-middle">
  <div id="view-sessions">
    <div class="table-wrap">
      <table id="sessions-table">
        <thead><tr id="table-head">
          <th data-key="label">Session</th>
          <th data-key="project">Project</th>
          <th data-key="state">State</th>
          <th data-key="last_access" class="sorted-desc">Last Activity</th>
          <th data-key="total_tokens">Tokens</th>
          <th data-key="user_messages">Msgs</th>
          <th data-key="model_provider">Model</th>
          <th>Actions</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-projects" style="display:none">
    <div class="table-wrap">
      <table id="projects-table">
        <thead><tr id="projects-head">
          <th data-key="project">Project</th>
          <th data-key="session_count">Sessions</th>
          <th data-key="total_tokens">Tokens</th>
          <th data-key="last_access">Last Activity</th>
        </tr></thead>
        <tbody id="projects-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-timeline" style="display:none">
    <div id="selection-summary-slot"></div>
    <div class="zoom-bar">
      <span class="zoom-label">View</span>
      <span class="zoom-range" id="zoom-range">...</span>
      <span class="zoom-mode" id="zoom-mode">DAY</span>
      <button class="zoom-btn" id="zoom-reset">Reset</button>
    </div>
    <div class="zoom-minimap" id="zoom-minimap"></div>
    <div class="timeline-wrap">
      <div class="timeline-chart" id="timeline-chart"></div>
      <div class="timeline-labels" id="timeline-labels"></div>
    </div>
    <div class="project-legend" id="project-legend"></div>
  </div>
</div>

<!-- ── BOTTOM (detail panel, pinned ~25%) ── -->
<div class="page-bottom closed" id="detail-panel"></div>
</div><!-- /page-layout -->

<script src="/static/base.js"></script>
<script>
(function(){
  var U = window.DashUtils;
  var REFRESH_MS = 12000;
  var INACTIVITY_DAYS = 3;
  var data = null;
  var selectedAccount = "all";
  var selectedPreset = "7d";
  var selectedView = "sessions";
  var searchText = "";
  var sortKey = "last_access";
  var sortDir = "desc";
  var selectedSessionId = null;

  // Projects view state
  var selectedProjectId = null;

  // Timeline state
  var allProjects = [];
  var projectColorMap = {};
  var selectedProjects = [];
  var selectedBuckets = [];
  var timelineBuckets = null;

  // Zoom state
  var zoomStart = 0;
  var zoomEnd = -1; // -1 means "all"
  var effectiveBucketMode = "day";
  var dayBuckets = [];
  var hourBuckets = [];

  // Raw timeline data from server
  var dayTimeline = [];
  var hourTimeline = [];

  var refreshCtrl = U.createRefreshController({
    interval: REFRESH_MS, onTick: fetchData,
    progressBar: document.getElementById("progress-bar"),
    refreshBtn: document.getElementById("refresh-toggle"),
    lastUpdateEl: document.getElementById("last-update")
  });
  document.getElementById("refresh-toggle").onclick = function(){ refreshCtrl.toggle(); };

  // ── Fetch ──
  async function fetchData(){
    try{
      var params="preset="+encodeURIComponent(selectedPreset)+"&bucket=day";
      if(selectedAccount!=="all") params+="&account="+encodeURIComponent(selectedAccount);
      var paramsHour="preset="+encodeURIComponent(selectedPreset)+"&bucket=hour";
      if(selectedAccount!=="all") paramsHour+="&account="+encodeURIComponent(selectedAccount);

      var results = await Promise.all([
        fetch("/api/snapshot?"+params).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}),
        fetch("/api/snapshot?"+paramsHour).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      ]);
      data = results[0];
      dayTimeline = (results[0].timeline||[]);
      hourTimeline = (results[1].timeline||[]);
      buildAllBuckets();
      render();
      document.getElementById("error-banner").innerHTML="";
    }catch(e){
      document.getElementById("error-banner").innerHTML=
        '<div class="error-banner">Fetch error: '+U.escHtml(String(e))+'</div>';
    }
    document.getElementById("last-update").textContent=new Date().toLocaleTimeString();
  }

  // ── Helpers ──
  function parseIso(s){if(!s)return null;try{return new Date(s).getTime()/1000;}catch(e){return null;}}
  function sessionTotalTokens(s){return parseInt((s.lifetime_usage||{}).total_tokens||0);}

  function getInactivityDays(){
    var el = document.getElementById("inact-days");
    if(el){ var v = parseInt(el.value); if(v>=1) return v; }
    return INACTIVITY_DAYS;
  }

  function isInactive(s){
    var days=getInactivityDays();
    var ts=parseIso(s.last_access);
    return ts&&(Date.now()/1000-ts)>days*86400;
  }

  function inferState(s){
    var ts=parseIso(s.last_access);
    if(!ts)return "unknown";
    if(isInactive(s))return "inactive";
    if(Date.now()/1000-ts<300){
      return(s.user_messages||0)>(s.agent_messages||0)?"awaiting_assistant":"waiting_for_user";
    }
    return "idle";
  }

  function stateClass(state){
    if(state==="awaiting_assistant"||state==="waiting_for_user")return "running";
    if(state==="inactive")return "inactive";
    return "idle";
  }

  function filteredSessions(){
    if(!data)return [];
    return (data.sessions||[]).filter(function(s){
      if(!searchText)return true;
      var q=searchText.toLowerCase();
      return [s.session_id,s.label,s.project,s.cwd,s.model_provider,s.originator,s.account_label].some(function(v){return v&&String(v).toLowerCase().includes(q);});
    });
  }

  // ── Build both day and hour bucket arrays from server timeline data ──
  function buildAllBuckets(){
    dayBuckets = buildBucketsFromTimeline(dayTimeline);
    hourBuckets = buildBucketsFromTimeline(hourTimeline);
  }

  function buildBucketsFromTimeline(timeline){
    var projSet={};
    var buckets=(timeline||[]).map(function(t){
      var b={key:t.bucket_start||"",projects:{},total:parseInt((t.usage||{}).total_tokens||0)};
      (t.project_rows||[]).forEach(function(pr){
        var name=pr.project||"(unknown)";
        var tokens=parseInt((pr.usage||{}).total_tokens||0);
        if(tokens>0){b.projects[name]=tokens;projSet[name]=true;}
      });
      return b;
    });
    return buckets;
  }

  // ── Render ──
  function render(){
    if(!data)return;
    var summary=data.summary||{},totals=summary.totals||{},win=data.window||{};

    // Metrics: if timeline with selected projects, compute filtered metrics
    if(selectedView==="timeline"&&selectedProjects.length>0){
      renderFilteredMetrics();
    }else{
      document.getElementById("m-input").textContent=U.compact(parseInt(totals.input_tokens||0));
      document.getElementById("m-output").textContent=U.compact(parseInt(totals.output_tokens||0));
      document.getElementById("m-cached").textContent=U.compact(parseInt(totals.cached_input_tokens||0));
      document.getElementById("m-sessions").textContent=U.compact(summary.session_count);
      document.getElementById("m-projects").textContent=U.compact(summary.project_count);
    }
    document.getElementById("m-latest").textContent=summary.latest_access?U.relTime(parseIso(summary.latest_access)):"\u2014";
    document.getElementById("m-context").textContent=U.compact(summary.max_context_window);
    document.getElementById("m-window").textContent=win.preset||"\u2014";

    renderAccountPills();
    renderActiveStrip();
    renderQuickStats();
    if(selectedView==="sessions") renderSessionsTable();
    else if(selectedView==="projects") renderProjectsTable();
    else if(selectedView==="timeline") renderTimeline();
    renderBulkDelete();
    U.initColumnResize(document.getElementById("sessions-table"));
  }

  function renderFilteredMetrics(){
    // Aggregate from timeline scoped to visible time window + selected projects
    var visibleKeys=timelineBuckets?timelineBuckets.map(function(b){return b.key;}):null;
    var srcTimeline=effectiveBucketMode==="hour"?hourTimeline:dayTimeline;
    var totalIn=0,totalOut=0,totalCached=0;
    var sessionSet={};
    var projectSet={};
    (srcTimeline||[]).forEach(function(t){
      var key=t.bucket_start||"";
      if(visibleKeys&&visibleKeys.indexOf(key)<0) return;
      (t.project_rows||[]).forEach(function(pr){
        var name=pr.project||"(unknown)";
        if(selectedProjects.indexOf(name)<0) return;
        var u=pr.usage||{};
        totalIn+=parseInt(u.input_tokens||0);
        totalOut+=parseInt(u.output_tokens||0);
        totalCached+=parseInt(u.cached_input_tokens||0);
        projectSet[name]=true;
      });
      (t.session_rows||[]).forEach(function(sr){
        if(selectedProjects.indexOf(sr.project||"(unknown)")>=0) sessionSet[sr.session_id||sr.label||""]=true;
      });
    });
    document.getElementById("m-input").textContent=U.compact(totalIn);
    document.getElementById("m-output").textContent=U.compact(totalOut);
    document.getElementById("m-cached").textContent=U.compact(totalCached);
    document.getElementById("m-sessions").textContent=U.compact(Object.keys(sessionSet).length);
    document.getElementById("m-projects").textContent=U.compact(Object.keys(projectSet).length);
  }

  function renderQuickStats(){
    if(!data) return;
    // For Codex, compute from session-level data using timestamps
    var nowTs=Date.now()/1000;
    var cutoff5h=nowTs-5*3600;
    var cutoff7d=nowTs-7*86400;
    var sessions=data.sessions||[];
    var h5={i:0,o:0,t:0}, d7={i:0,o:0,t:0};
    sessions.forEach(function(s){
      var ts=parseIso(s.last_access);
      if(!ts) return;
      var lt=s.lifetime_usage||{};
      // If session's last activity is within the window, count its tokens
      // (approximation: attribute session tokens to its last_access timestamp)
      if(ts>=cutoff5h){
        h5.i+=parseInt(lt.input_tokens||0);
        h5.o+=parseInt(lt.output_tokens||0);
        h5.t+=parseInt(lt.total_tokens||0);
      }
      if(ts>=cutoff7d){
        d7.i+=parseInt(lt.input_tokens||0);
        d7.o+=parseInt(lt.output_tokens||0);
        d7.t+=parseInt(lt.total_tokens||0);
      }
    });
    // Also try timeline buckets for more accurate 5h/7d if available
    if(hourTimeline&&hourTimeline.length){
      h5={i:0,o:0,t:0};
      hourTimeline.forEach(function(t){
        var bs=t.bucket_start||"";
        var bsTs;
        try{bsTs=new Date(bs).getTime()/1000;}catch(e){return;}
        if(bsTs>=cutoff5h){
          var u=t.usage||{};
          h5.i+=parseInt(u.input_tokens||0);
          h5.o+=parseInt(u.output_tokens||0);
          h5.t+=parseInt(u.total_tokens||0);
        }
      });
    }
    if(dayTimeline&&dayTimeline.length){
      d7={i:0,o:0,t:0};
      dayTimeline.forEach(function(t){
        var bs=t.bucket_start||"";
        var bsTs;
        try{bsTs=new Date(bs).getTime()/1000;}catch(e){return;}
        if(bsTs>=cutoff7d){
          var u=t.usage||{};
          d7.i+=parseInt(u.input_tokens||0);
          d7.o+=parseInt(u.output_tokens||0);
          d7.t+=parseInt(u.total_tokens||0);
        }
      });
    }
    var el=document.getElementById("quick-stats");
    el.innerHTML=
      '<div class="qs-group"><span class="qs-label">5h</span>'+
        '<span class="qs-item">in <span class="qs-val">'+U.compact(h5.i)+'</span></span>'+
        '<span class="qs-item">out <span class="qs-val">'+U.compact(h5.o)+'</span></span>'+
        '<span class="qs-item">total <span class="qs-val">'+U.compact(h5.t)+'</span></span></div>'+
      '<div class="qs-group"><span class="qs-label">7d</span>'+
        '<span class="qs-item">in <span class="qs-val">'+U.compact(d7.i)+'</span></span>'+
        '<span class="qs-item">out <span class="qs-val">'+U.compact(d7.o)+'</span></span>'+
        '<span class="qs-item">total <span class="qs-val">'+U.compact(d7.t)+'</span></span></div>';
  }

  function renderAccountPills(){
    var accounts=data.accounts||[];
    var html='<button class="pill'+(selectedAccount==="all"?" active":"")+'" data-account="all">All</button>';
    accounts.forEach(function(a){html+='<button class="pill'+(selectedAccount===a.account_key?" active":"")+'" data-account="'+U.escHtml(a.account_key)+'">'+U.escHtml(a.label||a.account_key)+'</button>';});
    var el=document.getElementById("account-pills");el.innerHTML=html;
    el.querySelectorAll(".pill").forEach(function(btn){btn.onclick=function(){selectedAccount=btn.dataset.account;fetchData();};});
  }

  function renderActiveStrip(){
    var sessions=filteredSessions().filter(function(s){var st=inferState(s);return st==="awaiting_assistant"||st==="waiting_for_user";});
    document.getElementById("active-strip").innerHTML=sessions.slice(0,10).map(function(s){
      return '<div class="active-card"><span class="pulse-dot"></span><span class="sid">'+U.escHtml(s.label||s.session_id.substring(0,12))+'</span><span class="proj">'+U.escHtml(s.project||"")+'</span><span class="tokens">'+U.compact(sessionTotalTokens(s))+'</span></div>';
    }).join("");
  }

  function renderSessionsTable(){
    var sessions=filteredSessions().map(function(s){
      var state=inferState(s);
      return Object.assign({},s,{_state:state,_inactive:state==="inactive",total_tokens:sessionTotalTokens(s),last_access_ts:parseIso(s.last_access)});
    });
    sessions=U.sortSessions(sessions,sortKey,sortDir);
    var tbody=document.getElementById("table-body");
    if(!sessions.length){tbody.innerHTML='<tr><td colspan="8" class="empty">No sessions found</td></tr>';}
    else{
      tbody.innerHTML=sessions.map(function(s){
        var sel=s.session_id===selectedSessionId?"selected":"";var inact=s._inactive?" inactive-row":"";
        return '<tr class="'+sel+inact+'" data-sid="'+U.escHtml(s.session_id)+'"><td>'+U.escHtml(s.label||s.session_id.substring(0,12))+'</td><td>'+U.escHtml(s.project||"")+'</td><td><span class="state '+stateClass(s._state)+'">'+U.escHtml(s._state.replace(/_/g," "))+'</span></td><td>'+U.relTime(s.last_access_ts)+'</td><td>'+U.compact(s.total_tokens)+'</td><td>'+String((s.user_messages||0)+(s.agent_messages||0))+'</td><td>'+U.escHtml(s.model_provider||"")+'</td><td>'+(s.resume_command?'<button class="cmd-copy" data-cmd="'+U.escHtml(s.resume_command)+'">cp</button>':'')+' <button class="delete-btn" data-sid="'+U.escHtml(s.session_id)+'">&times;</button></td></tr>';
      }).join("");
    }
    tbody.querySelectorAll("tr[data-sid]").forEach(function(row){
      row.onclick=function(e){
        if(e.target.classList.contains("cmd-copy")||e.target.classList.contains("delete-btn"))return;
        selectedSessionId=selectedSessionId===row.dataset.sid?null:row.dataset.sid;
        renderDetail(sessions);
        tbody.querySelectorAll("tr").forEach(function(r){r.classList.toggle("selected",r.dataset.sid===selectedSessionId);});
      };
    });
    tbody.querySelectorAll(".cmd-copy").forEach(function(btn){btn.onclick=function(e){e.stopPropagation();U.copyText(btn.dataset.cmd,btn);};});
    tbody.querySelectorAll(".delete-btn").forEach(function(btn){btn.onclick=function(e){e.stopPropagation();U.deleteSession("/api/session",btn.dataset.sid,function(){fetchData();});};});
    renderDetail(sessions);
  }

  function renderProjectsTable(){
    var projects=(data.projects||[]).filter(function(p){
      if(!searchText)return true;
      var q=searchText.toLowerCase();
      return [p.project,p.cwd].some(function(v){return v&&String(v).toLowerCase().includes(q);});
    });
    var tbody=document.getElementById("projects-body");
    if(!projects.length){tbody.innerHTML='<tr><td colspan="4" class="empty">No projects found</td></tr>';}
    else{
      tbody.innerHTML=projects.map(function(p){
        var lt=p.lifetime_usage||p.window_usage||{};
        var sel=selectedProjectId&&(p.project===selectedProjectId)?" selected":"";
        return '<tr class="project-row'+sel+'" data-project="'+U.escHtml(p.project||"")+'"><td>'+U.escHtml(p.project||"")+'</td><td>'+String(p.session_count||0)+'</td><td>'+U.compact(parseInt(lt.total_tokens||0))+'</td><td>'+U.relTime(parseIso(p.last_access))+'</td></tr>';
      }).join("");
    }
    // Click handler for project rows
    tbody.querySelectorAll("tr.project-row").forEach(function(row){
      row.onclick=function(){
        var pid=row.dataset.project;
        if(selectedProjectId===pid){
          selectedProjectId=null;
        }else{
          selectedProjectId=pid;
        }
        // Update row selection visually
        tbody.querySelectorAll("tr.project-row").forEach(function(r){
          r.classList.toggle("selected",r.dataset.project===selectedProjectId);
        });
        renderBottomPane();
      };
    });
    renderBottomPane();
  }

  // ── Bottom pane: session detail OR project sessions ──
  function renderBottomPane(){
    var panel=document.getElementById("detail-panel");
    // If projects view with a selected project, show project sessions
    if(selectedView==="projects"&&selectedProjectId){
      renderProjectSessions(panel);
      return;
    }
    // If sessions view with a selected session, renderDetail handles it
    if(selectedView==="sessions"&&selectedSessionId){
      return;
    }
    panel.classList.add("closed");
  }

  function renderProjectSessions(panel){
    if(!data||!selectedProjectId){panel.classList.add("closed");return;}
    // Find sessions matching this project
    var sessions=(data.sessions||[]).filter(function(s){
      return s.project===selectedProjectId;
    }).map(function(s){
      var state=inferState(s);
      return Object.assign({},s,{_state:state,_inactive:state==="inactive",total_tokens:sessionTotalTokens(s),last_access_ts:parseIso(s.last_access)});
    });
    var html='<div class="project-detail-header"><span class="proj-name">'+U.escHtml(selectedProjectId)+'</span><span class="proj-stat">'+sessions.length+' session'+(sessions.length!==1?'s':'')+'</span><button class="proj-close" id="proj-close">&times; Close</button></div>';
    html+='<table class="project-sessions-table"><thead><tr><th>Session ID</th><th>State</th><th>Last Activity</th><th>Tokens</th><th>Msgs</th></tr></thead><tbody>';
    if(!sessions.length){
      html+='<tr><td colspan="5" class="empty">No sessions</td></tr>';
    }else{
      sessions.forEach(function(s){
        html+='<tr><td>'+U.escHtml(s.label||s.session_id.substring(0,12))+'</td><td><span class="state '+stateClass(s._state)+'">'+U.escHtml(s._state.replace(/_/g," "))+'</span></td><td>'+U.relTime(s.last_access_ts)+'</td><td>'+U.compact(s.total_tokens)+'</td><td>'+String((s.user_messages||0)+(s.agent_messages||0))+'</td></tr>';
      });
    }
    html+='</tbody></table>';
    panel.innerHTML=html;
    panel.classList.remove("closed");
    document.getElementById("proj-close").onclick=function(){
      selectedProjectId=null;
      document.querySelectorAll("tr.project-row").forEach(function(r){r.classList.remove("selected");});
      panel.classList.add("closed");
    };
  }

  // ── Stacked Timeline ──
  function getVisibleBuckets(){
    var src=effectiveBucketMode==="day"?dayBuckets:hourBuckets;
    if(zoomEnd<0||zoomEnd>=src.length) return src;
    return src.slice(zoomStart,zoomEnd+1);
  }

  function autoSwitchBucketMode(){
    if(effectiveBucketMode==="day"){
      var visDays=dayBuckets.slice(zoomStart,zoomEnd<0?dayBuckets.length:zoomEnd+1);
      if(visDays.length<=3&&visDays.length>0&&hourBuckets.length>0){
        var firstKey=visDays[0].key;
        var lastKey=visDays[visDays.length-1].key;
        effectiveBucketMode="hour";
        var matchingStart=-1,matchingEnd=-1;
        hourBuckets.forEach(function(b,i){
          var dayPart=b.key.substring(0,10);
          if(dayPart>=firstKey.substring(0,10)&&dayPart<=lastKey.substring(0,10)){
            if(matchingStart<0) matchingStart=i;
            matchingEnd=i;
          }
        });
        if(matchingStart>=0){
          zoomStart=matchingStart;
          zoomEnd=matchingEnd;
        }else{
          zoomStart=0;
          zoomEnd=hourBuckets.length-1;
        }
      }
    }else if(effectiveBucketMode==="hour"){
      var visHours=hourBuckets.slice(zoomStart,zoomEnd<0?hourBuckets.length:zoomEnd+1);
      if(visHours.length>0){
        var daySet={};
        visHours.forEach(function(b){daySet[b.key.substring(0,10)]=true;});
        if(Object.keys(daySet).length>3){
          effectiveBucketMode="day";
          var firstDay=visHours[0].key.substring(0,10);
          var lastDay=visHours[visHours.length-1].key.substring(0,10);
          var dStart=-1,dEnd=-1;
          dayBuckets.forEach(function(b,i){
            var dk=b.key.substring(0,10);
            if(dk>=firstDay&&dk<=lastDay){
              if(dStart<0) dStart=i;
              dEnd=i;
            }
          });
          if(dStart>=0){
            zoomStart=dStart;
            zoomEnd=dEnd;
          }else{
            zoomStart=0;
            zoomEnd=-1;
          }
        }
      }
    }
  }

  function renderTimeline(){
    // Build stable color map from ALL buckets (colors don't shift on zoom)
    var src=effectiveBucketMode==="day"?dayBuckets:hourBuckets;
    var allProjSet={};
    src.forEach(function(b){Object.keys(b.projects).forEach(function(p){allProjSet[p]=true;});});
    var allProjsSorted=Object.keys(allProjSet).sort();
    projectColorMap={};
    allProjsSorted.forEach(function(p,i){projectColorMap[p]=U.projectColor(i);});

    autoSwitchBucketMode();
    var visible=getVisibleBuckets();
    timelineBuckets=visible;

    // Build project list from VISIBLE buckets only
    var visProjSet={};
    visible.forEach(function(b){Object.keys(b.projects).forEach(function(p){visProjSet[p]=true;});});
    allProjects=Object.keys(visProjSet).sort();
    // Prune selectedProjects to only those still visible
    selectedProjects=selectedProjects.filter(function(p){return visProjSet[p];});

    if(!visible||!visible.length){
      document.getElementById("timeline-chart").innerHTML='<div class="empty">No timeline data</div>';
      document.getElementById("timeline-labels").innerHTML="";
      document.getElementById("project-legend").innerHTML="";
      document.getElementById("selection-summary-slot").innerHTML="";
      renderZoomBar(visible);
      return;
    }

    renderZoomBar(visible);

    var maxVal=Math.max(1,Math.max.apply(null,visible.map(function(b){return b.total;})));
    var visibleProjects=selectedProjects.length?selectedProjects:allProjects;
    var chartEl=document.getElementById("timeline-chart");
    var labelsEl=document.getElementById("timeline-labels");

    chartEl.innerHTML=visible.map(function(b,bi){
      var barH=Math.max(2,b.total/maxVal*100);
      var segs="";
      allProjects.forEach(function(p){
        var val=b.projects[p]||0;if(!val)return;
        var isVis=visibleProjects.indexOf(p)>=0;
        var segH=val/b.total*barH;
        var opacity=isVis?"1":"0.15";
        segs+='<span class="bar-segment" style="height:'+segH+'%;background:'+projectColorMap[p]+';opacity:'+opacity+'" data-project="'+U.escHtml(p)+'" data-tokens="'+val+'"></span>';
      });
      var isSel=selectedBuckets.indexOf(b.key)>=0;
      var isDim=selectedBuckets.length>0&&!isSel;
      return '<div class="bucket-bar'+(isSel?" drag-selected":"")+(isDim?" dim":"")+'" data-bucket-key="'+U.escHtml(b.key)+'" data-idx="'+bi+'" style="height:'+barH+'%" title="'+U.escHtml(b.key)+': '+U.compact(b.total)+'">'+segs+'</div>';
    }).join("");

    labelsEl.innerHTML=visible.map(function(b){
      var k=b.key;
      var label;
      if(effectiveBucketMode==="hour"){
        // Show HH:00 format
        var timePart=k.length>=13?k.substring(11,13):"??";
        label=timePart+":00";
      }else{
        // Show MM-DD format
        label=k.length>=10?k.substring(5,10):k;
      }
      return '<span>'+U.escHtml(label)+'</span>';
    }).join("");

    // Click on bar
    chartEl.querySelectorAll(".bucket-bar").forEach(function(bar){
      bar.onclick=function(e){
        e.stopPropagation();
        var key=bar.dataset.bucketKey;
        if(selectedBuckets.length===1&&selectedBuckets[0]===key) selectedBuckets=[];
        else selectedBuckets=[key];
        renderTimeline();
      };
    });

    // Drag select
    setupTimelineDrag(chartEl);
    // Mousewheel zoom
    setupTimelineZoom(chartEl);
    // Minimap slider
    var fullSrc=effectiveBucketMode==="day"?dayBuckets:hourBuckets;
    U.renderZoomMinimap(document.getElementById("zoom-minimap"),fullSrc,zoomStart,
      zoomEnd<0?fullSrc.length-1:zoomEnd,
      function(ns,ne){zoomStart=ns;zoomEnd=ne;renderTimeline();});
    renderProjectLegend();
    renderSelectionSummary();
  }

  function renderZoomBar(visible){
    var rangeEl=document.getElementById("zoom-range");
    var modeEl=document.getElementById("zoom-mode");
    if(!visible||!visible.length){
      rangeEl.textContent="No data";
      modeEl.textContent=effectiveBucketMode.toUpperCase();
      return;
    }
    var firstKey=visible[0].key;
    var lastKey=visible[visible.length-1].key;
    function fmtLabel(k){
      try{
        var d=new Date(k.replace(" ","T"));
        if(isNaN(d.getTime())) return k;
        var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        if(effectiveBucketMode==="hour"){
          return months[d.getMonth()]+" "+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":00";
        }
        return months[d.getMonth()]+" "+d.getDate();
      }catch(e){return k;}
    }
    var rangeText=fmtLabel(firstKey);
    if(firstKey!==lastKey) rangeText+=" \u2013 "+fmtLabel(lastKey);
    rangeEl.textContent=rangeText;
    modeEl.textContent=effectiveBucketMode.toUpperCase();
  }

  function setupTimelineZoom(chartEl){
    chartEl.addEventListener("wheel",function(e){
      e.preventDefault();
      var src=effectiveBucketMode==="day"?dayBuckets:hourBuckets;
      if(!src.length) return;

      var curStart=zoomStart;
      var curEnd=(zoomEnd<0||zoomEnd>=src.length)?src.length-1:zoomEnd;
      var visLen=curEnd-curStart+1;

      var rect=chartEl.getBoundingClientRect();
      var ratio=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));

      var zoomAmount=Math.max(1,Math.round(visLen*0.15));

      if(e.deltaY<0){
        // Zoom in
        var shrinkLeft=Math.round(zoomAmount*ratio);
        var shrinkRight=zoomAmount-shrinkLeft;
        curStart=Math.min(curStart+shrinkLeft,curEnd);
        curEnd=Math.max(curEnd-shrinkRight,curStart);
      }else{
        // Zoom out
        var growLeft=Math.round(zoomAmount*ratio);
        var growRight=zoomAmount-growLeft;
        curStart=Math.max(0,curStart-growLeft);
        curEnd=Math.min(src.length-1,curEnd+growRight);
      }
      if(curStart===curEnd&&visLen>1){
        if(curStart>0) curStart--;
        else if(curEnd<src.length-1) curEnd++;
      }
      zoomStart=curStart;
      zoomEnd=curEnd;
      renderTimeline();
    },{passive:false});
  }

  document.getElementById("zoom-reset").onclick=function(){
    zoomStart=0;
    zoomEnd=-1;
    effectiveBucketMode="day";
    renderTimeline();
  };

  var _dragState=null;
  function setupTimelineDrag(chartEl){
    chartEl.onmousedown=function(e){
      var bar=e.target.closest(".bucket-bar");
      if(!bar) return;
      _dragState={startIdx:parseInt(bar.dataset.idx),endIdx:parseInt(bar.dataset.idx)};
      e.preventDefault();
    };
    document.onmousemove=function(e){
      if(!_dragState) return;
      var bars=Array.from(document.querySelectorAll("#timeline-chart .bucket-bar"));
      var best=-1,bestD=Infinity;
      bars.forEach(function(b,i){var r=b.getBoundingClientRect();var d=Math.abs(e.clientX-(r.left+r.width/2));if(d<bestD){bestD=d;best=i;}});
      if(best>=0) _dragState.endIdx=best;
      var lo=Math.min(_dragState.startIdx,_dragState.endIdx),hi=Math.max(_dragState.startIdx,_dragState.endIdx);
      bars.forEach(function(b,i){b.classList.toggle("drag-selected",i>=lo&&i<=hi);b.classList.toggle("dim",i<lo||i>hi);});
    };
    document.onmouseup=function(){
      if(!_dragState) return;
      var lo=Math.min(_dragState.startIdx,_dragState.endIdx),hi=Math.max(_dragState.startIdx,_dragState.endIdx);
      selectedBuckets=[];
      for(var i=lo;i<=hi;i++) if(timelineBuckets[i]) selectedBuckets.push(timelineBuckets[i].key);
      _dragState=null;
      renderTimeline();
    };
  }

  function renderProjectLegend(){
    var el=document.getElementById("project-legend");
    var hasFilter=selectedProjects.length>0;
    el.innerHTML=allProjects.map(function(p){
      var active=!hasFilter||selectedProjects.indexOf(p)>=0;
      return '<button class="legend-item'+(active?" active":"")+(hasFilter&&!active?" dimmed":"")+'" data-project="'+U.escHtml(p)+'"><span class="legend-swatch" style="background:'+projectColorMap[p]+'"></span>'+U.escHtml(p)+'</button>';
    }).join("");
    el.querySelectorAll(".legend-item").forEach(function(btn){
      btn.onclick=function(){
        var proj=btn.dataset.project;
        var idx=selectedProjects.indexOf(proj);
        if(idx>=0) selectedProjects.splice(idx,1);
        else selectedProjects.push(proj);
        render();
      };
    });
  }

  function renderSelectionSummary(){
    var slot=document.getElementById("selection-summary-slot");
    if(!selectedBuckets.length&&!selectedProjects.length){slot.innerHTML="";return;}
    var visProjects=selectedProjects.length?selectedProjects:allProjects;
    var visBuckets=selectedBuckets.length?selectedBuckets:timelineBuckets.map(function(b){return b.key;});
    var totalIn=0,totalOut=0,totalAll=0;
    // Use the appropriate raw timeline data based on effective bucket mode
    var srcTimeline=effectiveBucketMode==="day"?dayTimeline:hourTimeline;
    (srcTimeline||[]).forEach(function(t){
      if(visBuckets.indexOf(t.bucket_start||"")<0) return;
      (t.project_rows||[]).forEach(function(pr){
        if(visProjects.indexOf(pr.project||"(unknown)")<0) return;
        var u=pr.usage||{};
        totalIn+=parseInt(u.input_tokens||0);
        totalOut+=parseInt(u.output_tokens||0);
        totalAll+=parseInt(u.total_tokens||0);
      });
    });
    var parts=[];
    if(selectedBuckets.length) parts.push('<span class="sel-label">Buckets</span><span class="sel-value">'+selectedBuckets.length+'</span>');
    if(selectedProjects.length) parts.push('<span class="sel-label">Projects</span><span class="sel-value">'+selectedProjects.length+'</span>');
    parts.push('<span class="sel-label">Input</span><span class="sel-value">'+U.compact(totalIn)+'</span>');
    parts.push('<span class="sel-label">Output</span><span class="sel-value">'+U.compact(totalOut)+'</span>');
    parts.push('<span class="sel-label">Total</span><span class="sel-value">'+U.compact(totalAll)+'</span>');
    parts.push('<span class="sel-clear" id="sel-clear">Clear</span>');
    slot.innerHTML='<div class="selection-summary">'+parts.join("")+'</div>';
    document.getElementById("sel-clear").onclick=function(){selectedBuckets=[];selectedProjects=[];render();};
  }

  function renderBulkDelete(){
    var days=getInactivityDays();
    var inactiveCount=filteredSessions().filter(function(s){return inferState(s)==="inactive";}).length;
    var slot=document.getElementById("bulk-delete-slot");
    slot.innerHTML='<span class="inactivity-control"><input type="number" id="inact-days" value="'+days+'" min="1" max="365"><span class="unit">days</span></span> <button class="bulk-delete-btn" id="bulk-delete">Delete '+inactiveCount+' inactive</button>';
    document.getElementById("inact-days").onchange=function(){
      INACTIVITY_DAYS=parseInt(this.value)||3;
      render();
    };
    if(inactiveCount>0){
      document.getElementById("bulk-delete").onclick=function(){
        var d=getInactivityDays();
        U.deleteInactive("/api/sessions/inactive",inactiveCount,d,function(){fetchData();});
      };
    }else{
      document.getElementById("bulk-delete").disabled=true;
      document.getElementById("bulk-delete").style.opacity="0.4";
    }
  }

  function renderDetail(sessions){
    var panel=document.getElementById("detail-panel");
    // If in projects view and a project is selected, let renderProjectSessions handle it
    if(selectedView==="projects"&&selectedProjectId) return;
    if(!selectedSessionId){panel.classList.add("closed");return;}
    var s=(sessions||filteredSessions()).find(function(x){return x.session_id===selectedSessionId;});
    if(!s){panel.classList.add("closed");return;}
    panel.classList.remove("closed");
    var lt=s.lifetime_usage||{};
    var fields=[
      ["Session ID",s.session_id],["Label",s.label],["Project",s.project],["Working Path",s.cwd||s.working_path],
      ["State",s._state||inferState(s)],["First Activity",s.first_access||"\u2014"],["Last Activity",s.last_access||"\u2014"],
      ["Duration",s.duration_seconds?Math.round(s.duration_seconds/60)+"m":"\u2014"],
      ["Input",U.compact(parseInt(lt.input_tokens||0))],["Output",U.compact(parseInt(lt.output_tokens||0))],
      ["Cached",U.compact(parseInt(lt.cached_input_tokens||0))],["Reasoning",U.compact(parseInt(lt.reasoning_output_tokens||0))],
      ["Total",U.compact(parseInt(lt.total_tokens||0))],["Model",s.model_provider],["CLI",s.cli_version],
      ["Originator",s.originator],["Context",U.compact(s.context_window)],["Last Msg",s.last_user_message||"\u2014"],
    ];
    var html='<div class="detail-grid">';
    fields.forEach(function(f){html+='<div class="detail-field"><div class="dlabel">'+U.escHtml(f[0])+'</div><div class="dvalue">'+U.escHtml(String(f[1]||"\u2014"))+'</div></div>';});
    if(s.resume_command) html+='<div class="detail-field" style="grid-column:1/-1"><div class="dlabel">Resume Command</div><div class="dvalue mono">'+U.escHtml(s.resume_command)+' <button class="cmd-copy" onclick="DashUtils.copyText(\''+U.escHtml(s.resume_command.replace(/'/g,"\\'"))+'\',this)">copy</button></div></div>';
    html+='</div>';
    panel.innerHTML=html;
  }

  // ── View tabs ──
  document.getElementById("view-tabs").querySelectorAll(".tab").forEach(function(btn){
    btn.onclick=function(){
      selectedView=btn.dataset.view;
      document.querySelectorAll("#view-tabs .tab").forEach(function(t){t.classList.toggle("active",t.dataset.view===selectedView);});
      document.getElementById("view-sessions").style.display=selectedView==="sessions"?"":"none";
      document.getElementById("view-projects").style.display=selectedView==="projects"?"":"none";
      document.getElementById("view-timeline").style.display=selectedView==="timeline"?"":"none";
      // Reset bottom pane when switching views
      if(selectedView!=="projects") selectedProjectId=null;
      if(selectedView!=="sessions") selectedSessionId=null;
      document.getElementById("detail-panel").classList.add("closed");
      render();
    };
  });

  // ── Preset chips ──
  document.getElementById("preset-chips").querySelectorAll(".pill").forEach(function(btn){
    btn.onclick=function(){
      selectedPreset=btn.dataset.preset;
      document.querySelectorAll("#preset-chips .pill").forEach(function(p){p.classList.toggle("active",p.dataset.preset===selectedPreset);});
      fetchData();
    };
  });

  // ── Sort headers ──
  document.getElementById("table-head").querySelectorAll("th[data-key]").forEach(function(th){
    th.onclick=function(){
      var key=th.dataset.key;
      if(sortKey===key)sortDir=sortDir==="desc"?"asc":"desc";else{sortKey=key;sortDir="desc";}
      document.querySelectorAll("#table-head th").forEach(function(h){h.classList.remove("sorted-asc","sorted-desc");});
      th.classList.add(sortDir==="desc"?"sorted-desc":"sorted-asc");
      render();
    };
  });

  document.getElementById("search").addEventListener("input",function(){searchText=this.value.trim();render();});

  // ── Boot ──
  fetchData().then(function(){refreshCtrl.schedule();});
})();
</script>
