<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1f;
      color: #e8e8ed;
    }
    h3 { margin: 0 0 12px; font-size: 14px; }
    .status { color: #8b8b96; margin-bottom: 12px; font-size: 12px; }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    button {
      width: 100%;
      padding: 10px;
      background: #5e6ad2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #7078e8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .info { font-size: 11px; color: #8b8b96; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>ProxyServer Context</h3>
  <div id="status" class="status">Ready to send browser context</div>
  <button id="send-btn">Send Context</button>
  <div class="info">Sends cookies and localStorage for the current tab to the ProxyServer dashboard AI chat.</div>
  <script src="popup.js"></script>
</body>
</html>
